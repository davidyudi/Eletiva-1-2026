<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulário 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container py-3">
        <h3>Formulário 3</h3>
        <h1 class="d-grid gap-2 col-3 mx-auto">Sample Form</h1>
        <form method="post">
            <div class="row inline-row mb-3">
                <label for="Name" class="col-sm-2 col-form-label">Partner Name</label>
                <div class="col-md-4">
                    <input type="text" id="Name" name="Name" class="form-control">
                </div>
                <label for="Email" class="col-sm-2 col-form-label">Partner Email ID</label>
                <div class="col-md-4">
                    <input type="text" id="Email" name="Email" class="form-control">
                </div>
            </div>
            <div class="row inline-row mb-3">
                <label for="Legal" class="col-sm-2 col-form-label">Partner Legal Name</label>
                <div class="col-md-4">
                    <input type="text" id="Legal" name="Legal" class="form-control">
                </div>
                <label for="Mobile" class="col-sm-2 col-form-label">Partner Mobile</label>
                <div class="col-md-4">
                    <input type="text" id="Mobile" name="Mobile" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
            <label for="address" class="col-sm-2 col-form-label">Partner Address</label>
            <div class="col-sm-10">
                <input type="text" id="address" name="address" class="form-control col-md-8">
            </div></div>
            <div class="row inline-row mb-3">
                <label for="Start" class="col-sm-2 col-form-label">Contract Start Date</label>
                <div class="col-md-4">
                    <input type="text" id="Start" name="Start" class="form-control" placeholder="Date Start">
                </div>
                <label for="Expiry" class="col-sm-2 col-form-label">Contract Expiry Date</label>
                <div class="col-md-4">
                    <input type="text" id="Expiry" name="Expiry" class="form-control" placeholder="Date End">
                </div>
            </div>
            <div class="row inline-row mb-3">
                <label for="Minimum" class="col-sm-2 col-form-label">Minimum Loan Amount</label>
                <div class="col-md-4">
                    <input type="text" id="Minimum" name="Minimum" class="form-control">
                </div>
                <label for="Maximum" class="col-sm-2 col-form-label">Maximum Loan Amount</label>
                <div class="col-md-4">
                    <input type="text" id="Maximum" name="Maximum" class="form-control">
                </div>
            </div>
            <div class="row inline-row mb-3">
                <label for="Interest" class="col-sm-2 col-form-label">Interest Rate</label>
                <div class="col-md-4">
                    <input type="text" id="Interest" name="Interest" class="form-control">
                </div>
                <label for="Deposit" class="col-sm-2 col-form-label">Deposit Amount</label>
                <div class="col-md-4">
                    <input type="text" id="Deposit" name="Deposit" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-primary d-grid gap-2 col-1 mx-auto">Save</button>
        </form>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
            crossorigin="anonymous"></script>
    </div>
</body>

</html>
